<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - EventMart</title>

  <link rel="stylesheet" href="Landing.css">
  <link rel="stylesheet" href="Shop.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar" style="position:fixed; top:0; left:0; right:0; z-index:1000;">
    <a href="Landing.html" class="logo">
      <img src="EVE6.png" alt="EventMart Logo">
    </a>

    <ul class="navlist">
      <li><a href="Landing.html">Home</a></li>
      <li class="dropdown">
        <a href="Shop.html" class="active">Shop</a>
        <ul class="dropdown-menu" id="shopNavCategories" data-dynamic-shop-menu>
          <li><a href="Shop.html">All Categories</a></li>
        </ul>
      </li>
      <li><a href="About.html">About Us</a></li>
      <li><a href="Contact.html">Contact Us</a></li>
    </ul>

    <a href="RegisterSignIn.html" class="reg-text">Register / Sign in</a>
  </nav>

  <main class="shop-shell">
    <aside class="shop-sidebar">
      <div class="sidebar-head">
        <h2>Categories</h2>
        <button id="clearFilters" class="btn-small-ghost" type="button">Clear</button>
      </div>

      <button id="allItemsBtn" class="cat-btn active" data-cat="ALL" type="button">All Items</button>
      <div id="dynamicSidebarCategories" class="dynamic-categories"></div>
    </aside>

    <section class="shop-content">
      <div class="shop-head">
        <div>
          <h1>Shop</h1>
          <p class="muted" id="resultsText">Showing all items</p>
        </div>

        <div class="shop-tools">
          <input id="searchInput" class="search" type="search" placeholder="Search items...">
          <select id="sortSelect" class="sort">
            <option value="featured">Sort: Featured</option>
            <option value="name">Name: A - Z</option>
            <option value="low">Price: Low to High</option>
            <option value="high">Price: High to Low</option>
          </select>
        </div>
      </div>

      <section class="most-selling">
        <div class="most-selling-head">
          <h2>Most Selling</h2>
          <div class="scroll-controls">
            <button id="msLeft" class="scroll-btn" type="button">&lsaquo;</button>
            <button id="msRight" class="scroll-btn" type="button">&rsaquo;</button>
          </div>
        </div>

        <div id="mostSellingRow" class="most-selling-row"></div>
      </section>

      <div id="productsGrid" class="products-grid"></div>
    </section>
  </main>

  <div id="modalBackdrop" class="modal-backdrop" aria-hidden="true">
    <div class="modal">
      <button id="modalClose" class="modal-close" type="button">X</button>

      <div class="modal-body">
        <div class="modal-media">
          <img id="modalImg" src="" alt="Product image">
        </div>

        <div class="modal-info">
          <h2 id="modalTitle"></h2>
          <p id="modalDesc" class="muted"></p>

          <div id="modalTags" class="tags"></div>

          <h3 class="small-title">Quality</h3>
          <ul id="modalQuality" class="quality"></ul>

          <div id="modalPrices" class="modal-prices"></div>

          <div class="qty-row">
            <label for="modalQty">Quantity</label>
            <input id="modalQty" type="number" min="1" value="1">
          </div>

          <div class="modal-actions">
            <button id="buyNow" class="btn primary" type="button">Buy Now</button>
            <button id="addToCart" class="btn" type="button">Add to Cart</button>
          </div>
          <p id="cartMsg" class="cart-msg"></p>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <p>&copy; 2026 EventMart | All rights reserved.</p>
    </div>
  </footer>

  <script src="navbar-dynamic.js"></script>
  <script src="Shop.js"></script>
</body>
</html>
