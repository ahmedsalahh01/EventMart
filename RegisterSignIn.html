<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register / Sign In - EventMart</title>
  <link rel="stylesheet" href="Landing.css">
  <link rel="stylesheet" href="RegisterSignIn.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar" style="position:fixed; top:0; left:0; right:0; z-index:1000;">
    <a href="Landing.html" class="logo">
      <img src="EVE6.png" alt="EventMart Logo">
    </a>

    <ul class="navlist">
      <li><a href="Landing.html">Home</a></li>
      <li class="dropdown">
        <a href="Shop.html">Shop</a>
        <ul class="dropdown-menu" data-dynamic-shop-menu>
          <li><a href="Shop.html">All Categories</a></li>
        </ul>
      </li>
      <li><a href="About.html">About Us</a></li>
      <li><a href="Contact.html">Contact Us</a></li>
    </ul>

    <a href="RegisterSignIn.html" class="reg-text">Register / Sign in</a>
  </nav>

  <main class="auth-shell">
    <section class="auth-card">
      <a class="brand" href="Landing.html">EventMart</a>
      <h1>Account Access</h1>
      <p class="subtitle">Sign in to continue or create a new account.</p>

      <input class="mode-input" type="radio" name="auth-mode" id="mode-signin" checked>
      <input class="mode-input" type="radio" name="auth-mode" id="mode-register">

      <div class="mode-toggle" role="tablist" aria-label="Auth mode switch">
        <label for="mode-signin">Sign In</label>
        <label for="mode-register">Register</label>
      </div>

      <div class="forms-grid">
        <form id="signInForm" class="auth-form sign-in-form" action="#" method="post">
          <h2>Sign In</h2>
          <label for="signInEmail">Email</label>
          <input id="signInEmail" name="email" type="email" placeholder="you@example.com" required>

          <label for="signInPassword">Password</label>
          <input id="signInPassword" name="password" type="password" placeholder="Your password" required>

          <div class="form-row">
            <label class="checkbox">
              <input type="checkbox">
              <span>Remember me</span>
            </label>
            <a href="#" class="inline-link">Forgot password?</a>
          </div>

          <button type="submit">Sign In</button>
        </form>

        <form id="registerForm" class="auth-form register-form" action="#" method="post">
          <h2>Register</h2>
          <label for="registerName">Full Name</label>
          <input id="registerName" name="name" type="text" placeholder="Your full name" required>

          <label for="registerEmail">Email</label>
          <input id="registerEmail" name="email" type="email" placeholder="you@example.com" required>

          <label for="registerPassword">Password</label>
          <input id="registerPassword" name="password" type="password" placeholder="Create password" required>

          <label for="registerConfirmPassword">Confirm Password</label>
          <input id="registerConfirmPassword" name="confirmPassword" type="password" placeholder="Confirm password" required>

          <label class="checkbox">
            <input type="checkbox" required>
            <span>I agree to the terms and privacy policy</span>
          </label>

          <button type="submit">Create Account</button>
        </form>
      </div>
      <p id="authStatus" class="auth-status" aria-live="polite"></p>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>&copy; 2026 EventMart | All rights reserved.</p>
    </div>
  </footer>

  <script src="navbar-dynamic.js"></script>
  <script src="RegisterSignIn.js"></script>
</body>
</html>
